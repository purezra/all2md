<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All2MD</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="hero-topbar">
        <div class="hero-brand">
          <img class="hero-logo" src="pig_md.svg" alt="All2MD">
          <div>
            <div class="eyebrow">All2MD Plugin</div>
            <div class="hero-caption">当前页一键转 Markdown</div>
          </div>
        </div>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="切换主题">暗色</button>
      </div>

      <div class="hero-main">
        <div class="hero-copy">
          <h1 id="hero-title">当前网页</h1>
          <p id="page-meta" class="subtitle">等待当前页面响应…</p>
        </div>
        <div class="hero-notes">
          <span class="hero-chip">本地提取</span>
          <span class="hero-chip">不上传正文</span>
          <span class="hero-chip">ZIP + 图片</span>
        </div>
      </div>
    </section>

    <section class="panel actions-panel">
      <div class="toolbar-grid">
        <button id="extract-btn" class="btn btn-primary btn-wide" type="button">提取当前页</button>
        <button id="copy-btn" class="btn btn-secondary" type="button" disabled>复制</button>
        <button id="download-btn" class="btn btn-secondary" type="button" disabled>下载 .md</button>
        <button id="download-zip-btn" class="btn btn-secondary" type="button" disabled>下载 .zip</button>
      </div>

      <div id="status" class="status status-info">打开支持的平台页面后，点击“提取当前页”。</div>

      <div class="meta-strip">
        <div class="support-box">
          当前稳定支持：微信公众号、知乎、今日头条、GitHub README。
        </div>
        <div class="meta-row">
          <span id="platform-pill" class="pill">未检测</span>
          <span id="title-meta" class="meta-text">尚无结果</span>
        </div>
      </div>
    </section>

    <section class="panel content-panel">
      <div class="content-topbar">
        <div class="view-toggle">
          <button id="tab-source" class="view-tab active" type="button">Markdown</button>
          <button id="tab-preview" class="view-tab" type="button">预览</button>
        </div>
        <div class="content-label">可复制、可导出、可预览</div>
      </div>

      <textarea id="markdown-output" spellcheck="false" placeholder="提取结果会显示在这里…"></textarea>
      <div id="preview-output" class="preview hidden"></div>
    </section>
  </main>

  <script src="lib/markdown.js"></script>
  <script src="lib/jszip.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
