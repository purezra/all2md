<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章转 Markdown</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f8fa; margin: 0; padding: 0; min-height: 100vh;
    }
    header {
      background: #fff; border-bottom: 1px solid #d0d7de;
      padding: 16px 24px; display: flex; align-items: center; gap: 12px;
    }
    header h1 { margin: 0; font-size: 20px; font-weight: 700; color: #24292f; }
    header span { font-size: 13px; color: #57606a; }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
    .input-card {
      background: #fff; border: 1px solid #d0d7de; border-radius: 10px;
      padding: 20px 24px; margin-bottom: 20px;
    }
    .health-card {
      background: #fff; border: 1px solid #d0d7de; border-radius: 10px;
      padding: 14px 16px; margin-bottom: 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    }
    .health-title { font-size: 13px; color: #57606a; font-weight: 600; }
    .health-meta { font-size: 13px; color: #57606a; }
    .input-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .platform-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .platform-chip {
      border: 1px solid #d0d7de; background: #f6f8fa; color: #57606a;
      padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all .15s ease;
    }
    .platform-chip.active { background: #0969da; color: #fff; border-color: #0969da; }
    .input-row input {
      flex: 1; min-width: 260px; padding: 10px 14px;
      border: 1px solid #d0d7de; border-radius: 8px;
      font-size: 15px; outline: none; transition: border .2s;
    }
    .input-row input:focus { border-color: #0969da; box-shadow: 0 0 0 3px #dbeafe; }
    .btn {
      padding: 10px 22px; border: none; border-radius: 8px; font-size: 15px;
      cursor: pointer; font-weight: 600; transition: opacity .15s;
    }
    .btn:active { opacity: .75; }
    .btn-primary { background: #0969da; color: #fff; }
    .btn-green  { background: #1a7f37; color: #fff; }
    .btn-gray   { background: #e6eaf0; color: #24292f; }
    .tabs { display: flex; gap: 2px; margin-bottom: 0; }
    .tab {
      padding: 8px 20px; border-radius: 8px 8px 0 0; font-size: 14px;
      cursor: pointer; background: #e6eaf0; color: #57606a; border: 1px solid #d0d7de; border-bottom: none;
    }
    .tab.active { background: #fff; color: #0969da; font-weight: 600; }
    .result-card {
      background: #fff; border: 1px solid #d0d7de; border-radius: 0 10px 10px 10px;
      padding: 0; overflow: hidden;
    }
    .toolbar {
      background: #f6f8fa; border-bottom: 1px solid #d0d7de;
      padding: 10px 16px; display: flex; gap: 8px; align-items: center;
    }
    .toolbar span { font-size: 13px; color: #57606a; margin-left: auto; }
    .split-view {
      display: grid; grid-template-columns: minmax(320px, 1fr) minmax(320px, 1fr);
      min-height: 500px;
    }
    .panel { min-width: 0; }
    .panel + .panel { border-left: 1px solid #d0d7de; }
    .panel-head {
      padding: 10px 16px; font-size: 13px; font-weight: 700; color: #57606a;
      background: #f6f8fa; border-bottom: 1px solid #d0d7de;
    }
    #md-source {
      width: 100%; min-height: 450px; padding: 20px 24px;
      font-family: "SFMono-Regular", Consolas, monospace; font-size: 13.5px;
      border: none; resize: vertical; outline: none; line-height: 1.7;
      color: #24292f; background: #fff;
    }
    .preview-wrap {
      padding: 24px 28px; min-height: 450px;
      display: block;
    }
    .markdown-body { max-width: 800px; }
    .preview-wrap img { max-width: 100%; height: auto; }
    @media (max-width: 900px) {
      .split-view { grid-template-columns: 1fr; }
      .panel + .panel { border-left: none; border-top: 1px solid #d0d7de; }
    }
    #status {
      display: none; padding: 14px 18px; border-radius: 8px; margin-bottom: 14px;
      font-size: 14px; font-weight: 500;
    }
    .status-loading { background: #dbeafe; color: #1e40af; display: flex !important; align-items: center; gap: 8px; }
    .status-error   { background: #fde8e8; color: #b91c1c; display: block !important; }
    .spinner {
      width: 18px; height: 18px; border: 3px solid #93c5fd;
      border-top-color: #1d4ed8; border-radius: 50%;
      animation: spin .7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
    .tag {
      display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 12px;
      font-weight: 600; margin-left: 8px;
    }
    .tag-wechat { background: #d1fae5; color: #065f46; }
    .tag-zhihu  { background: #dbeafe; color: #1e3a8a; }
    .tag-toutiao { background: #fee2e2; color: #b91c1c; }
    .tag-ok     { background: #dcfce7; color: #166534; }
    .tag-bad    { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 24 24" fill="#0969da"><path d="M14.85 3a1 1 0 0 1 .9.57l.06.16L19 14H5l3.2-10.27A1 1 0 0 1 9.14 3h5.71zM12 17a2 2 0 1 1 0 4 2 2 0 0 1 0-4z"/></svg>
  <h1>文章转 Markdown</h1>
  <span>支持微信公众号 · 知乎专栏 · 知乎回答</span>
</header>

<div class="container">
  <div class="health-card">
    <span class="health-title">浏览器状态</span>
    <span id="health-badge" class="tag">检测中</span>
    <span id="health-meta" class="health-meta">正在检查服务端浏览器连接…</span>
    <button class="btn btn-gray" type="button" onclick="refreshHealth()">刷新状态</button>
  </div>

  <div class="input-card">
    <div class="platform-row">
      <button class="platform-chip active" type="button" data-platform="" onclick="setPlatform('')">自动识别</button>
      <button class="platform-chip" type="button" data-platform="wechat" onclick="setPlatform('wechat')">微信公众号</button>
      <button class="platform-chip" type="button" data-platform="zhihu" onclick="setPlatform('zhihu')">知乎</button>
      <button class="platform-chip" type="button" data-platform="toutiao" onclick="setPlatform('toutiao')">今日头条</button>
    </div>
    <div class="input-row">
      <input id="url-input" type="text" placeholder="粘贴文章链接或整段分享文案…" autocomplete="off" />
      <button class="btn btn-primary" onclick="convert()">🚀 开始转换</button>
    </div>
  </div>

  <div id="status"></div>

  <div id="result-section" class="hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
      <span id="article-title" style="font-size:14px;color:#57606a;max-width:50%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
    </div>
    <div class="result-card">
      <div class="toolbar">
        <button class="btn btn-gray" onclick="copyMd()">📋 复制 Markdown</button>
        <button class="btn btn-green" onclick="downloadMd()">⬇️ 下载 .md 文件</button>
        <button class="btn btn-green" onclick="downloadZip()">🗜️ 下载 ZIP（md + images）</button>
        <button class="btn btn-gray" onclick="reset()">🔄 重新转换</button>
        <span id="char-count"></span>
      </div>
      <div class="split-view">
        <div class="panel">
          <div class="panel-head">Markdown 源码</div>
          <textarea id="md-source" spellcheck="false" oninput="renderPreview()"></textarea>
        </div>
        <div class="panel">
          <div class="panel-head">预览</div>
          <div class="preview-wrap markdown-body" id="preview-area"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script>
  let currentTitle = "article";
  let currentPlatform = "";
  let selectedPlatform = "";
  let currentZipMarkdown = "";
  let currentPreviewMarkdown = "";
  let currentAssets = [];
  let preferPreviewMarkdown = false;
  let loadingTimer = null;

  const input = document.getElementById("url-input");
  input.addEventListener("keydown", e => { if (e.key === "Enter") convert(); });
  refreshHealth();

  async function convert() {
    const text = input.value.trim();
    if (!text) { alert("请先粘贴文章链接或分享文案"); return; }

    startLoadingStatus();
    document.getElementById("result-section").classList.add("hidden");

    try {
      const res = await fetch("/api/convert", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ input: text, platformHint: selectedPlatform })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "转换失败");

      currentTitle = data.title || "article";
      currentPlatform = data.platform || "";
      currentZipMarkdown = data.zipMarkdown || data.markdown || "";
      currentPreviewMarkdown = data.previewMarkdown || currentZipMarkdown || data.markdown || "";
      preferPreviewMarkdown = true;
      currentAssets = Array.isArray(data.assets) ? data.assets : [];
      document.getElementById("article-title").innerHTML =
        currentTitle + `<span class="tag tag-${currentPlatform}">${platformLabel(currentPlatform)}</span>`;

      const mdArea = document.getElementById("md-source");
      mdArea.value = data.markdown;
      document.getElementById("char-count").textContent = `共 ${data.markdown.length.toLocaleString()} 字符`;

      hideStatus();
      document.getElementById("result-section").classList.remove("hidden");
      renderPreview();
    } catch (err) {
      showStatus("error", "❌ " + err.message);
    }
  }

  async function refreshHealth() {
    const badge = document.getElementById("health-badge");
    const meta = document.getElementById("health-meta");
    badge.className = "tag";
    badge.textContent = "检测中";
    meta.textContent = "正在检查服务端浏览器连接…";

    try {
      const res = await fetch("/api/health");
      const data = await res.json();
      if (!res.ok || !data.browser) throw new Error("健康检查失败");

      const browser = data.browser;
      badge.classList.add(browser.ok ? "tag-ok" : "tag-bad");
      badge.textContent = browser.ok ? "已就绪" : "不可用";

      if (browser.ok) {
        const modeMap = { remote: "远程调试", managed: "服务托管", disconnected: "未连接" };
        const mode = modeMap[browser.mode] || browser.mode;
        const detail = [
          `模式：${mode}`,
          `无头：${browser.headless === false ? "否" : "是"}`,
          browser.wsConfigured ? "已配置远程 Chrome" : "未配置远程 Chrome",
          browser.userDataDir ? `Profile：${browser.userDataDir}` : ""
        ].filter(Boolean).join(" · ");
        meta.textContent = detail;
      } else {
        meta.textContent = browser.error || "浏览器未就绪";
      }
    } catch (err) {
      badge.classList.add("tag-bad");
      badge.textContent = "不可用";
      meta.textContent = err.message || "健康检查失败";
    }
  }

  function setPlatform(platform) {
    selectedPlatform = platform;
    document.querySelectorAll(".platform-chip").forEach(el => {
      el.classList.toggle("active", el.dataset.platform === platform);
    });
    input.placeholder = platform === "wechat"
      ? "粘贴公众号文章链接或分享文案…"
      : platform === "zhihu"
        ? "粘贴知乎链接或分享文案…"
        : platform === "toutiao"
          ? "粘贴今日头条链接或分享文案…"
          : "粘贴文章链接或整段分享文案…";
  }

  function platformLabel(platform) {
    if (platform === "wechat") return "微信";
    if (platform === "zhihu") return "知乎";
    if (platform === "toutiao") return "头条";
    return "未知";
  }

  function renderPreview() {
    const preEl = document.getElementById("preview-area");
    const source = preferPreviewMarkdown
      ? (currentPreviewMarkdown || document.getElementById("md-source").value)
      : document.getElementById("md-source").value;
    preferPreviewMarkdown = false;
    preEl.innerHTML = marked.parse(source);
  }

  async function copyMd() {
    const text = document.getElementById("md-source").value;
    await navigator.clipboard.writeText(text);
    alert("✅ 已复制到剪贴板");
  }

  async function downloadMd() {
    const markdown = document.getElementById("md-source").value;
    const res = await fetch("/api/download", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ markdown, filename: currentTitle })
    });
    const blob = await res.blob();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = currentTitle + ".md";
    a.click();
  }

  async function downloadZip() {
    const markdown = currentZipMarkdown || document.getElementById("md-source").value;
    const res = await fetch("/api/download-zip", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ markdown, filename: currentTitle, assets: currentAssets })
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || "下载 ZIP 失败");
    }
    const blob = await res.blob();
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = currentTitle + ".zip";
    a.click();
  }

  function reset() {
    input.value = "";
    currentZipMarkdown = "";
    currentPreviewMarkdown = "";
    currentAssets = [];
    preferPreviewMarkdown = false;
    document.getElementById("result-section").classList.add("hidden");
    hideStatus();
    input.focus();
  }

  function showStatus(type, msg) {
    const el = document.getElementById("status");
    el.className = "";
    if (type === "loading") {
      el.classList.add("status-loading");
      el.innerHTML = `<div class="spinner"></div><span>${msg}</span>`;
    } else {
      el.classList.add("status-error");
      el.textContent = msg;
    }
    el.style.display = type === "loading" ? "flex" : "block";
  }

  function startLoadingStatus() {
    const steps = [
      "正在解析链接或分享文案…",
      "正在打开文章页面…",
      "正在抓取正文内容…",
      "正在处理图片与排版…",
      "正在生成 Markdown…"
    ];
    let index = 0;
    showStatus("loading", steps[index]);

    if (loadingTimer) clearInterval(loadingTimer);
    loadingTimer = setInterval(() => {
      index = Math.min(index + 1, steps.length - 1);
      showStatus("loading", steps[index]);
    }, 1800);
  }

  function hideStatus() {
    if (loadingTimer) {
      clearInterval(loadingTimer);
      loadingTimer = null;
    }
    const el = document.getElementById("status");
    el.style.display = "none";
    el.className = "";
    el.innerHTML = "";
  }
</script>
</body>
</html>
